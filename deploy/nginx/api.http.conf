# Step 1 — use BEFORE SSL certificate exists.
# Install: sudo cp deploy/nginx/api.http.conf /etc/nginx/sites-available/singari-api
#          sudo ln -sf /etc/nginx/sites-available/singari-api /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx
# Then:    sudo bash deploy/setup-ssl.sh

upstream singari_api {
    server 127.0.0.1:5001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.singarisaree.com;

    client_max_body_size 15m;

    # Let's Encrypt HTTP-01 challenge (certbot --webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location /uploads/ {
        proxy_pass http://singari_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://singari_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Socket.io (admin realtime)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
}
