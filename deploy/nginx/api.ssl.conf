# Step 2 — use AFTER Let's Encrypt certificate is issued (setup-ssl.sh installs this).
# Requires certs at /etc/letsencrypt/live/api.singarisaree.com/

upstream singari_api {
    server 127.0.0.1:5001;
    keepalive 32;
}

# HTTP → HTTPS redirect (keep acme-challenge for cert renewal)
server {
    listen 80;
    listen [::]:80;
    server_name api.singarisaree.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.singarisaree.com;

    ssl_certificate /etc/letsencrypt/live/api.singarisaree.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.singarisaree.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 15m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location /uploads/ {
        proxy_pass http://singari_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://singari_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
}
