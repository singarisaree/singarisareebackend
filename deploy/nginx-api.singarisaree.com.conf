# Nginx — api.singarisaree.com (legacy path; use deploy/nginx/ + setup-ssl.sh)
#
# Quick start on VPS:
#   sudo bash deploy/install-nginx.sh
#   sudo bash deploy/setup-ssl.sh --email you@example.com
#
# Manual:
#   1. sudo cp deploy/nginx/api.http.conf /etc/nginx/sites-available/singari-api
#   2. sudo ln -sf /etc/nginx/sites-available/singari-api /etc/nginx/sites-enabled/
#   3. sudo nginx -t && sudo systemctl reload nginx
#   4. sudo bash deploy/setup-ssl.sh

# See deploy/nginx/api.http.conf (before cert) and deploy/nginx/api.ssl.conf (after cert).
